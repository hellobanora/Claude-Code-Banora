name: Blog Draft Notification

on:
  push:
    branches: [main]
    paths:
      - banora-website/src/data/blog.ts

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Telegram of draft posts
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TITLES=$(grep -A15 "status: 'draft'" banora-website/src/data/blog.ts | grep "title:" | sed "s/.*title: '//;s/',.*//;s/.*title: \"//;s/\",.*//" | head -10)
          if [ -z "$TITLES" ]; then
            echo "No drafts found"
            exit 0
          fi
          LIST=$(echo "$TITLES" | awk '{print NR". "$0}' | tr '\n' ' | ')
          curl -s "https://api.telegram.org/bot${BOT}/sendMessage?chat_id=${CHAT}&text=Blog+drafts+ready+to+publish:+${LIST}"
