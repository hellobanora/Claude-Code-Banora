name: Blog Draft Notification

on:
  push:
    branches: [main]
    paths:
      - banora-website/src/data/blog.ts

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Telegram of draft posts
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TITLES=$(grep -B5 "status: 'draft'" banora-website/src/data/blog.ts | grep "title:" | sed "s/.*title: '//;s/',//" | sed "s/.*title: \"//;s/\".*//" | head -10)
          if [ -z "$TITLES" ]; then
            echo "No drafts found"
            exit 0
          fi
          MSG="Blog drafts ready to review:%0A%0A$(echo "$TITLES" | while read -r t; do echo "- $t"; done | tr '\n' '%0A')"
          curl -s "https://api.telegram.org/bot${BOT}/sendMessage?chat_id=${CHAT}&text=${MSG}"
