name: Blog Draft Notification

on:
  push:
    branches: [main]
    paths:
      - banora-website/src/data/blog.ts

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Telegram of draft posts
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - << 'EOF'
          import re, urllib.request, urllib.parse, os

          with open("banora-website/src/data/blog.ts") as f:
              content = f.read()

          blocks = content.split("{")
          drafts = []
          for block in blocks:
              if "status: 'draft'" in block:
                  m = re.search(r"title:\s*['\"](.+?)['\"]", block)
                  if m:
                      drafts.append(m.group(1))

          if not drafts:
              print("No drafts found")
              exit(0)

          msg = "Blog drafts ready to publish:\n\n" + "\n".join(f"- {t}" for t in drafts)
          data = urllib.parse.urlencode({"chat_id": os.environ["CHAT"], "text": msg}).encode()
          urllib.request.urlopen(f"https://api.telegram.org/bot{os.environ['BOT']}/sendMessage", data)
          print(f"Sent notification for {len(drafts)} drafts")
          EOF
